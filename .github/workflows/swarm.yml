name: ai-farm-swarm

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

jobs:
  swarm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role: [researcher, writer, analyst, scout, builder, planner, memory, commander]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: Run ${{ matrix.role }}
        env:
          FARM_URL: ${{ secrets.FARM_URL }}
          FARM_KEY: ${{ secrets.FARM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AGENT_ROLE: ${{ matrix.role }}
          NODE_ID: gh-${{ matrix.role }}
          RUN_SECONDS: "240"
        run: python farm_node.py
